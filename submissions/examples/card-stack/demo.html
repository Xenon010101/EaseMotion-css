<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Card Stack</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="stack">
    <div class="stack-card" style="--i: 0"><span>Card 1</span></div>
    <div class="stack-card" style="--i: 1"><span>Card 2</span></div>
    <div class="stack-card" style="--i: 2"><span>Card 3</span></div>
    <div class="stack-card" style="--i: 3"><span>Card 4</span></div>
  </div>
</body>
</html>
