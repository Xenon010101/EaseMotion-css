<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Loading Skeleton - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="skeleton-showcase">
    <h1>Skeleton Loading</h1>
    <div class="skeleton-row">
      <div class="skeleton-card">
        <div class="sk-avatar"></div>
        <div class="sk-body">
          <div class="sk-line sk-line--lg"></div>
          <div class="sk-line sk-line--md"></div>
          <div class="sk-line sk-line--sm"></div>
        </div>
      </div>
      <div class="skeleton-card">
        <div class="sk-avatar sk-avatar--round"></div>
        <div class="sk-body">
          <div class="sk-line sk-line--lg"></div>
          <div class="sk-line sk-line--md"></div>
        </div>
      </div>
    </div>
    <div class="skeleton-card skeleton-card--stack">
      <div class="sk-thumb"></div>
      <div class="sk-body">
        <div class="sk-line sk-line--lg"></div>
        <div class="sk-line sk-line--md"></div>
        <div class="sk-line sk-line--sm"></div>
      </div>
    </div>
    <div class="skeleton-row">
      <div class="skeleton-card">
        <div class="sk-avatar"></div>
        <div class="sk-body">
          <div class="sk-line sk-line--lg"></div>
          <div class="sk-line sk-line--md"></div>
        </div>
      </div>
      <div class="skeleton-card">
        <div class="sk-avatar sk-avatar--round"></div>
        <div class="sk-body">
          <div class="sk-line sk-line--lg"></div>
          <div class="sk-line sk-line--md"></div>
          <div class="sk-line sk-line--sm"></div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
