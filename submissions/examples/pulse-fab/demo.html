<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pulse FAB</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="fab-container">
    <p class="fab-hint">A pulsing FAB in the corner</p>
    <button class="pulse-fab" aria-label="Add new">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </button>
  </div>
</body>
</html>
