<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Badge Dot Pulse - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="bdp-wrapper">
    <h2>Status Indicator Dots</h2>
    <div class="bdp-demo">
      <div class="bdp-item" data-state="online">
        <span class="bdp-dot"></span>
        <span class="bdp-label">Online</span>
      </div>
      <div class="bdp-item" data-state="away">
        <span class="bdp-dot"></span>
        <span class="bdp-label">Away</span>
      </div>
      <div class="bdp-item" data-state="offline">
        <span class="bdp-dot"></span>
        <span class="bdp-label">Offline</span>
      </div>
    </div>
  </div>
</body>
</html>
